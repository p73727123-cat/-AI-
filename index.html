    .player-name { color:#b9c7dc; font-size:14px; }.player-name strong{color:#fff;margin-left:4px}.xp-track,.hp-track{height:7px;overflow:hidden;border-radius:9px;background:#3a4a62}.xp-fill{height:100%;width:0;background:linear-gradient(90deg,#28b8df,#7299ff);transition:width .35s}.top-actions{display:flex;gap:8px;align-items:center}.icon-btn,.login-btn{border:0;border-radius:9px;color:#fff;background:#33435a;min-height:38px;padding:0 13px}.login-btn{background:#5143e8}.icon-btn[aria-pressed="true"]{background:#165c47}.view{display:none}.view.active{display:block}.section-title{display:flex;gap:8px;align-items:center;margin:28px 0 22px;font-size:22px}.section-title span{color:var(--gold)}
    .map-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:21px}.map-card{position:relative;min-height:174px;padding:48px 24px 18px;border:0;border-radius:16px;text-align:left;color:#fff;overflow:hidden;transition:transform .2s,filter .2s;box-shadow:inset 0 -45px 80px #0002}.map-card:hover:not(:disabled){transform:translateY(-4px);filter:brightness(1.07)}.map-card:disabled{cursor:not-allowed;filter:saturate(.48) brightness(.64)}.map-card h2{position:relative;margin:7px 0 8px;font-size:27px}.map-card p{position:relative;margin:0;color:#e8f2ff;font-size:14px}.map-card .enter{position:relative;display:inline-flex;margin-top:19px;padding:7px 13px;border-radius:18px;background:#0004;font-size:13px}.map-card::after{content:"";position:absolute;right:-14px;bottom:-24px;width:145px;height:145px;border:24px solid #fff2;border-radius:48% 52% 35% 65%;transform:rotate(18deg)}.green{background:linear-gradient(135deg,#13ae5e,#08754c)}.blue{background:linear-gradient(135deg,#3f70ec,#263a99)}.orange{background:linear-gradient(135deg,#ef8509,#a64206)}.purple{background:linear-gradient(135deg,#a430e7,#6121a6)}.locked{background:linear-gradient(135deg,#5a6c83,#313f51)}.lock{position:absolute;right:20px;top:18px;font-size:22px}.hint{color:var(--muted);font-size:14px;margin:18px 0 0}
    .stage-head{display:flex;justify-content:space-between;align-items:center;gap:14px;margin:24px 0 16px}.back{border:0;background:transparent;color:#b7caf1;padding:6px 0;font-weight:700}.stage-name{margin:0;font-size:24px}.stage-tag{margin:4px 0 0;color:#b6c6de;font-size:14px}.battle-panel{padding:15px;border:1px solid var(--line);border-radius:14px;background:var(--panel)}.battle-row{display:flex;gap:12px;align-items:center}.boss-icon{display:grid;width:44px;height:44px;place-items:center;border-radius:12px;background:#44233a;font-size:24px}.battle-copy{flex:1}.battle-copy small{color:#f4bdc4}.battle-copy strong{display:block;margin-top:3px}.hp-track{margin-top:8px;background:#442e39}.hp-fill{height:100%;width:100%;background:linear-gradient(90deg,#ef5361,#ff9c71);transition:width .45s}.progress-text{margin:12px 2px 0;color:var(--muted);font-size:14px}.question-card{margin-top:16px;padding:clamp(18px,3.5vw,34px);border:1px solid var(--line);border-radius:16px;background:var(--panel);box-shadow:0 16px 40px #0002}.question-meta{display:flex;flex-wrap:wrap;gap:9px;align-items:center;color:#b5c6df;font-size:14px}.badge{padding:4px 9px;border-radius:20px;background:#31435c;color:#dbe9ff;font-size:12px}.badge.boss{background:#663443;color:#ffd4d9}.question-text{white-space:pre-wrap;font-family:"Noto Serif TC","PMingLiU",serif;font-size:clamp(18px,2.5vw,22px);font-weight:700;line-height:1.8;margin:23px 0}.boss-visual{display:none;align-items:center;gap:18px;margin:0 0 24px;padding:14px;border:1px solid #9c5466;border-radius:12px;background:linear-gradient(100deg,#45243b,#1f2945)}.boss-visual.show{display:flex}.boss-visual svg{width:116px;max-width:30%;filter:drop-shadow(0 6px 7px #0008)}.boss-visual strong{display:block;color:#ffe0c5}.boss-visual p{margin:6px 0;color:#d3d8ed;font-size:14px;line-height:1.55}.options{display:grid;gap:12px}.option{display:flex;gap:12px;align-items:flex-start;width:100%;padding:15px 16px;border:1px solid #4a5d78;border-radius:12px;background:#26354a;color:#fff;text-align:left;line-height:1.7;transition:border .18s,background .18s,transform .18s}.option:hover{border-color:#82a9f5;transform:translateX(2px)}.option.selected{border-color:#f6b51e;background:#42452f}.option input{accent-color:#f6b51e;margin:7px 0 0;transform:scale(1.2)}.answer-actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:23px}.primary,.secondary{border:0;border-radius:10px;padding:11px 16px;font-weight:800}.primary{background:linear-gradient(135deg,#ffcb36,#eb9811);color:#322000}.primary:disabled{cursor:not-allowed;opacity:.45}.secondary{background:#34445b;color:#f4f7fc}.feedback{display:none;margin-top:20px;padding:17px;border:1px solid #4b617e;border-radius:12px;background:#1b293a;line-height:1.75}.feedback.show{display:block}.feedback.correct{border-color:#29b875;background:#173a31}.feedback.wrong{border-color:#ec6773;background:#442b36}.feedback h3{margin:0 0 8px;font-size:17px}.feedback p{margin:8px 0;white-space:pre-wrap}.feedback details{margin-top:10px}.feedback summary{cursor:pointer;color:#f5cf74}.next-wrap{display:none;margin-top:18px}.next-wrap.show{display:block}.shake-wrong{animation:shake .42s linear}.shake-good{animation:pulse .42s ease-out}@keyframes shake{20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}@keyframes pulse{50%{filter:brightness(1.25)}}.modal{position:fixed;inset:0;z-index:10;display:none;place-items:center;padding:16px;background:#060b14b8}.modal.show{display:grid}.modal-box{width:min(620px,100%);max-height:90vh;overflow:auto;padding:26px;border:1px solid #5e7191;border-radius:18px;background:#1d2a3e;box-shadow:0 25px 65px #0009}.modal-box h2{margin:0 0 12px}.modal-box p{line-height:1.75;color:#d6e0f0}.modal-close{float:right;border:0;border-radius:7px;background:#384a63;color:#fff;padding:6px 9px}.character-choices{display:flex;flex-wrap:wrap;gap:10px;margin:16px 0}.character{border:1px solid #617493;border-radius:10px;background:#2b3b52;color:#fff;padding:11px 14px}.small{font-size:13px;color:#aab9cd}.clear-stamp{display:inline-block;margin:14px 0;padding:8px 13px;border:3px solid #ffc927;border-radius:6px;color:#ffc927;font-weight:900;letter-spacing:2px;transform:rotate(-7deg)}.error-list{margin:10px 0;padding-left:20px;line-height:1.7}.summon{position:fixed;right:20px;bottom:20px;z-index:4;border:0;border-radius:28px;padding:12px 16px;background:linear-gradient(135deg,#7c35d3,#4e20a9);color:white;box-shadow:0 8px 22px #0007;font-weight:800}.hidden{display:none!important}
    .final-report{margin-top:22px;padding-top:18px;border-top:1px solid #50647e}.final-report h3{margin:18px 0 8px;color:#ffd66e}.round-error-grid{display:grid;grid-template-columns:repeat(5,minmax(72px,1fr));gap:7px;margin:13px 0}.round-error-chip{padding:9px 7px;border:1px solid #516681;border-radius:9px;background:#26364a;text-align:center;font-size:12px;color:#cfdbeb}.round-error-chip strong{display:block;margin-top:3px;color:#ffd36c;font-size:15px}.miss-card{margin:10px 0;border:1px solid #566b87;border-radius:11px;background:#182638}.miss-card summary{display:grid;grid-template-columns:auto 1fr auto;gap:9px;align-items:center;cursor:pointer;padding:12px 13px;color:#f1f5fb;font-weight:700}.miss-card summary span{font-size:12px;color:#b9cae0}.miss-card summary strong{color:#ffd56c}.miss-content{padding:0 14px 15px;border-top:1px solid #465b75}.miss-content h4{margin:14px 0 7px;color:#a9c9ff;font-size:14px}.miss-content p{margin:0;white-space:pre-wrap;color:#edf4fc;line-height:1.8}.miss-options{margin:8px 0 0;padding-left:20px;line-height:1.7;color:#d7e0ed}.study-guide{margin:10px 0;padding:13px 14px;border-left:4px solid #f1b732;border-radius:0 10px 10px 0;background:#28384a}.study-guide h4{margin:0 0 6px;color:#ffe08a}.study-guide p{margin:4px 0!important;font-size:14px}
    @media(max-width:680px){.shell{width:min(100% - 20px,1180px);padding-top:10px}.topbar{gap:10px}.player{min-width:0}.top-actions{gap:4px}.login-btn{font-size:0;width:39px;padding:0}.login-btn::after{content:"◌";font-size:18px}.map-grid{grid-template-columns:1fr;gap:14px}.map-card{min-height:154px}.stage-head{align-items:flex-start;flex-direction:column}.question-card{padding:18px}.option{padding:13px}.boss-visual{align-items:flex-start}.boss-visual svg{max-width:38%}.round-error-grid{grid-template-columns:repeat(3,minmax(72px,1fr))}.miss-card summary{grid-template-columns:1fr;gap:4px}}

<body>
  <main class="shell" id="app">
    <header class="topbar">
      <div class="avatar" aria-hidden="true">🦆</div>
      <div class="player"><div class="player-name">Lv.<strong id="level">1</strong> <span>菜鳥書生</span></div><div class="xp-track" aria-label="經驗值"><div class="xp-fill" id="xpFill"></div></div></div>
      <div class="top-actions"><button class="icon-btn" id="musicBtn" aria-pressed="false" title="開啟背景音樂">🔊</button><button class="login-btn" id="profileBtn">◯ 冒險者</button></div>
    </header>

    <section class="view active" id="mapView">
      <h1 class="section-title"><span>♧</span> 修煉地圖</h1>
      <div class="map-grid">
        <button class="map-card green" id="openStage"><h2>燭之武峽谷</h2><p>第一回・李斯魔將</p><span class="enter">點擊進入　➜</span></button>
        <button class="map-card blue" id="secondStage" disabled><span class="lock" id="secondLock">🔒</span><h2>鴻門戰場</h2><p>第二回・霸王項羽</p><span class="enter" id="secondEnter">尚未解鎖</span></button>
        <button class="map-card orange" id="thirdStage" disabled><span class="lock" id="thirdLock">🔒</span><h2>師道學院</h2><p>第三回・虬髯客</p><span class="enter" id="thirdEnter">尚未解鎖</span></button>
        <button class="map-card purple" id="fourthStage" disabled><span class="lock" id="fourthLock">🔒</span><h2>項脊軒書院</h2><p>第四回・勞山道士</p><span class="enter" id="fourthEnter">尚未解鎖</span></button>
        <button class="map-card locked" id="fifthStage" disabled><span class="lock" id="fifthLock">🔒</span><h2>和諧部落</h2><p>第五回・張李德和</p><span class="enter" id="fifthEnter">尚未解鎖</span></button>
      </div>
      <p class="hint">前四回可測試：10 題題庫、Boss 戰、答題解析、進度保存與 AI 互動預留入口。</p>
    </section>

    <section class="view" id="stageView">
      <div class="stage-head"><div><button class="back" id="backMap">← 返回修煉地圖</button><h1 class="stage-name" id="stageName">燭之武峽谷</h1><p class="stage-tag" id="stageTag">第一回・燭之武、大同小康、諫逐客書</p></div><span class="badge" id="stageBadge">第一回測試關</span></div>
      <div class="battle-panel" id="battlePanel"><div class="battle-row"><div class="boss-icon" id="bossIcon">👹</div><div class="battle-copy"><small>Boss：<span id="bossName">李斯魔將</span></small><strong>魔將生命值 <span id="hpText">100</span> / 100</strong><div class="hp-track"><div class="hp-fill" id="hpFill"></div></div></div></div><p class="progress-text" id="progressText">已征服 0 / 10 題　・　EXP 0　・　正確率 0%</p></div>
      <article class="question-card" id="questionCard">
        <div class="question-meta"><span class="badge" id="questionNumber">第 1 題</span><span class="badge" id="questionType">單選題</span><span class="badge boss hidden" id="bossBadge">魔王試煉</span></div>
        <div class="boss-visual" id="bossVisual"><svg viewBox="0 0 190 175" role="img" aria-label="魔王"><path d="M28 147Q17 85 48 48L65 61 76 22 95 46 116 15 126 57 150 45Q176 91 158 147Z" fill="#7f2e5d"/><path d="M51 78 73 69 78 91 55 96ZM114 69 138 78 135 96 112 91Z" fill="#ffca46"/><path d="M62 118Q95 139 130 116" fill="none" stroke="#ffd0b5" stroke-width="7" stroke-linecap="round"/><path d="M42 150H151" stroke="#5dbef4" stroke-width="15" stroke-linecap="round"/></svg><div><strong id="bossVisualName">李斯魔將現身！</strong><p>第 10 題為魔王多選題。選對所有答案，即可造成最後一擊。</p></div></div>
        <h2 class="question-text" id="questionText"></h2>
        <div class="options" id="options"></div>
        <div class="answer-actions"><button class="primary" id="submitBtn">提交答案</button><button class="secondary" id="explainBtn">查看解析</button></div>
        <div class="feedback" id="feedback"></div>
        <div class="next-wrap" id="nextWrap"><button class="primary" id="nextBtn">下一題　➜</button></div>
      </article>
    </section>
  </main>
  <button class="summon" id="summonBtn">✨ 召喚古人</button>

  <div class="modal" id="modal"><div class="modal-box" id="modalContent"></div></div>

  <script>
    // 題目文字、選項與詳解逐字取自使用者提供的第一回 JSON；此測試版保留其 10 題結構。
    const ROUND_ONE = [
      {id:1,type:'單選題',text:`下列「 」內的字，讀音前後相同的是：`,options:[`(A) 「闕」漏／宮「闕」`,`(B) 綢「繆」／秦「繆」公`,`(C) 以「著」其義／文學名「著」`,`(D) 「矜」寡孤獨／哀「矜」勿喜`],answer:'C',analysis:`(A)ㄑㄩㄝ／ㄑㄩㄝˋ (B)ㄇㄡˊ／ㄇㄨˋ (C)皆音ㄓㄨˋ (D)ㄍㄨㄢ／ㄐㄧㄣ。`},
      {id:2,type:'單選題',text:`下列文句，用字完全正確的是：`,options:[`(A) 孔子參予蠟祭後，向學生進一步說明大同世界的內容`,`(B) 夫子盼望選賢與能，講信修慕，使弱勢族群都得到照顧`,`(C) 小康之治是指六君子的禮治，若不由此，在埶者去，眾以為恙`,`(D) 全球化的時代來臨，夫子的治世理想，可敦促世界和平的思考`],answer:'D',analysis:`(A)予→與 (B)慕→睦 (C)恙→殃。`},
      {id:3,type:'單選題',text:`〈燭之武退秦師〉中，燭之武遊說秦君的角度，何者說明正確？`,options:[`(A) 「越國以鄙遠，君知其難也」：由地理位置說明亡鄭對秦無好處`,`(B) 「以為東道主，行李之往來，共其乏困」：威嚇將玉石俱焚`,`(C) 「許君焦、瑕，朝濟而夕設版焉」：以利誘秦君`,`(D) 「既東封鄭，又欲肆其西封」：以歷史教訓掀起宿怨`],answer:'A',analysis:`(B)提出對秦有利之處 (C)刺秦君隱痛 (D)邏輯推理晉國野心。`},
      {id:4,type:'單選題',text:`下列關於〈大同與小康〉文句闡釋正確的是：`,options:[`(A) 「矜、寡、孤、獨、廢、疾者皆有所養」可看出在大同世界中，人人皆有仁愛之心，照顧弱勢，已有現代社會福利制度的概念`,`(B) 「謀閉而不興」趨近老子所言之「絕聖棄智」，指執政者若能拋棄知識、謀略，實施「無為而治」，萬物便能自化，達到天下大同的政治理想`,`(C) 「禹、湯、文、武、成王、周公，由此其選也」指六君子皆由人民以「選賢與能」的方式舉用，故在其領導之下，社會自然安定和諧`,`(D) 「刑仁講讓，示民有常」寫小康之治須以刑罰、仁愛並施，方能使百姓收斂私欲，復歸於禮義的常道`],answer:'A',analysis:`(B)「謀」指奸謀，意謂大同之治中，人人無機變巧詐之舉。大同之治為儒家之政治理想，與道家「絕聖棄智」的政治理想相去較遠　(C)小康之治中，天下、帝位為私有，是以「世及」方式傳承；「選」為優秀人物之意，非指「選賢與能」之政治制度　(D)「刑」通「型」，指以仁德作為典範。小康社會講求「禮治」，以禮昭示人民生活的常法。`},
      {id:5,type:'單選題',text:`下列關於〈諫逐客書〉一文的分析，正確的是`,options:[`(A) 以「臣聞吏議逐客，竊以為過矣」對秦王提出諫諍，指陳小人亂國，朝廷讒言四起，有害於國家大業`,`(B) 以秦國四位國君任用客卿有功之歷史史實，驗證「客何負於秦哉」之結論，以過往之是，暗示今日逐客之非`,`(C) 以異國之樂對比「擊甕叩缶，彈箏搏髀」之真秦聲，肯定秦王「快意當前，適觀而已」之藝術品味`,`(D) 以「王者不卻眾庶，故能明其德」激勵秦王宜擴大野心，增廣疆域，以納天下眾民，彰顯國君的能容風範`],answer:'B',analysis:`(A)採開門見山法，以「過」直指「逐客」為錯誤的政策　(C)以異國音樂之取，對比「非秦者去，為客者逐」之捨，凸顯秦王「重物輕人」之謬誤　(D)以此提醒秦王廣納賢士、重用客卿才是秦國一統天下的良方。`},
      {id:6,type:'單選題',text:`語文中有文句上下同字詞類活用的現象，透過改變詞性，完成句意的表達。如：「不獨『親』其『親』」，同一「親」字，分別作動詞及名詞使用，即是一例。下列文句亦符合此種詞性用法的是：`,options:[`(A) 「以」正君臣，「以」篤父子`,`(B) 地「無」四方，民「無」異國`,`(C) 既東「封」鄭，又欲肆其西「封」`,`(D) 弟子不必不如「師」，「師」不必賢於弟子`],answer:'C',analysis:`動詞，親愛／名詞，親長　(A)動詞，用／動詞，用　(B)動詞，不論／動詞，不論　(C)動詞，以……為領土／名詞，疆域　(D)名詞，老師／名詞，老師。韓愈〈師說〉。語譯：學生不一定不如老師，老師也不一定比學生高明。`},
      {id:7,type:'單選題',text:`下列關於〈燭之武退秦師〉、〈大同與小康〉、〈諫逐客書〉三文表達技巧的說解，正確的是：`,options:[`(A) 〈燭之武退秦師〉以議論批判，推進情節發展`,`(B) 〈大同與小康〉以評議當時社會亂象為基調`,`(C) 〈諫逐客書〉以開門見山手法，展開論述`,`(D) 三文皆條理清晰，足見戰國時期縱橫捭闔的氣勢`],answer:'c',analysis:`(A)〈燭之武退秦師〉以對話形式推進情節發展　(B)〈大同與小康〉以提出儒家政治理想為主旨　(D)「縱橫捭闔」指政治或外交上慣用的拉攏、分化等靈活高明的手段。〈大同與小康〉旨在說明五帝與三代之英執政時的社會型態，並寄託儒家政治理想；〈諫逐客書〉旨在論述驅逐客卿是錯誤的決策，故二文皆無「縱橫捭闔」之效。`},
      {id:8,type:'多選題',text:`下列「 」中之字義，前後相同的是：`,options:[`(A) 向使四君「卻」客而不內／王者不「卻」眾庶`,`(B) 「舉」世皆濁我獨清／「舉」地千里，至今治彊`,`(C) 然則是所「重」者在乎色樂珠玉／則古人賤尺璧而「重」寸陰`,`(D) 故人不「獨」親其親／矜、寡、孤、「獨」、廢、疾者皆有所養`,`(E) 「由」此觀之，客何負於秦哉／如有不「由」此者，在埶者去`],answer:'AC',analysis:`(A)皆指「拒絕、推辭」之義　(B)全、皆、整個。屈原〈漁父〉／攻取　(C)皆指「重視、看重、珍惜」。後者出自曹丕《典論．論文》　(D)僅僅、只是／老而無子　(E)自、從（介詞）／依照、遵循（動詞）。`},
      {id:9,type:'多選題',text:`下列關於〈大同與小康〉之敘述，正確的是：`,options:[`(A) 全篇書及禮的演進與循環，先有亂世，再至小康，最終復歸於大同`,`(B) 以孔子參加魯國歲末大祭時，有感於魯國禮義衰頹，因而勸諫魯哀公的歷程，推展全文`,`(C) 孔子認為小康之治大道隱沒、帝位私有、欲望擴張，幸虧尚有三代之英以禮義匡正社會`,`(D) 孔子認為國君若不謹行禮義，便會遭天下人視為禍害，最終結果便是遭到罷黜、廢棄`,`(E) 大同之治講求「禮義」，人倫規範、社會制度都仰賴其建立；小康之治人心凋弊，須以更具強制力的「刑罰」限制之`],answer:'CD',analysis:`(A)本文旨在說明、寄託儒家之政治理想，非言禮之演進與循環　(B)孔子藉與言偃對話，闡發心中的理想政治　(E)大同世界裡人的善性、良知自然顯露，社會和諧、均富均勞；而小康社會中，為維持倫常、政治、社會等制度，須以「禮義」規範之。`},
      {id:10,type:'魔王多選題',isBoss:true,text:`下列關於〈燭之武退秦師〉、〈大同與小康〉、〈諫逐客書〉三文表達技巧的說明，正確的是：`,options:[`(A) 〈燭之武退秦師〉全篇以「退秦師」為中心，借過往歷史事件，說明鞏固政權之必要`,`(B) 〈大同與小康〉分列大同及小康之治，此中「是謂『大同』」、「是謂『小康』」二句，具有收結分述之效`,`(C) 〈諫逐客書〉全文旨在闡明「客辜負秦」，分論納客之利及逐客之害，推出結論`,`(D) 〈燭之武退秦師〉、〈大同與小康〉標題皆後人所加，無法從篇名見得主旨；〈諫逐客書〉標題為作者自訂，可推知文眼`,`(E) 〈諫逐客書〉以「不逐」為說；〈燭之武退秦師〉則情感與利害互融；〈大同與小康〉充分顯現出對儒家的嚮往`],answer:'BE',analysis:`魔王題解析： (A)全文旨在說明事在人為，弱國還是可以透過外交手段來爭取自身的權益　(C)應是「客不負秦」（「客何負於秦哉」）　(D)〈燭之武退秦師〉、〈大同與小康〉、〈諫逐客書〉三文標題皆由後人依文章主旨所加。`}
    ];
    const ROUND_TWO = [
      {id:1,type:'單選題',text:`下列「 」中字義前後相同的是：`,options:[`(A) 「尋」向所誌／未果，「尋」病終`,`(B) 「緣」溪行，忘路之遠近／「緣」木求魚`,`(C) 願陛下託臣以討賊興復之「效」／恐託付不「效」`,`(D) 願伯「具」言臣之不敢倍德／問所從來，「具」答之`],answer:'D',analysis:`(A)尋找、搜求／不久　(B)沿著／攀爬　(C)任務／達到功效　(D)皆指「詳細」。`},
      {id:2,type:'單選題',text:`〈鴻門宴〉中范增特別勸告項羽「沛公居山東時，貪於財貨，好美姬。今入關，財物無所取，婦女無所幸，此其志不在小」，關於沛公此番行為的分析，正確的是：`,options:[`(A) 寬闊大度，慈悲為懷`,`(B) 籠絡民心，志在天下`,`(C) 以退為進，取信項王`,`(D) 君權神授，天命所歸`],answer:'B',analysis:`(B)此句范增之言，既顯現范增的觀察敏銳與深謀遠慮，更點出了劉邦為爭奪天下、騙取民心的權謀。`},
      {id:3,type:'單選題',text:`下列關於「大行不顧細謹，大禮不辭小讓。如今人方為刀俎，我為魚肉，何辭為」一句的敘述，正確的是：`,options:[`(A) 「大行不顧細謹，大禮不辭小讓」意謂「大德不逾閑，小德出入可也」`,`(B) 「人為刀俎，我為魚肉」比喻人我之間關係密切，牽一髮而動全身`,`(C) 本段文字主旨乃勸人須有自知之明，切勿妄發議論`,`(D) 本段文字行文手法為：先給出建議、分析現狀再陳述義理`],answer:'A',analysis:`(A)「大行不顧細謹，大禮不辭小讓」謂成大事者不拘泥小節；與「大德不逾閑，小德出入可也」意指堅守大節，不拘小節，句意相近。後句出自《論語．子張》。語譯：人在重大節操不能越出範圍，小節上有些出入是可以的。閑，木欄，此指範圍　(B)此句比喻我方處劣勢，只能任人宰割　(C)此處點出劉邦明白兩軍匯集關中必相爭鬥，然而敵強己弱，己身處境如肉置砧板上，勢在必敗　(D)本段文字行文手法為：先陳述義理（「大行不顧細謹，大禮不辭小讓」）、分析現狀（「如今人方為刀俎，我為魚肉」），再給出建議（「何辭為」）。`},
      {id:4,type:'單選題',text:`「誠宜開張聖聽，以光先帝遺德，恢弘志士之氣；不宜妄自菲薄，引喻失義，以塞忠諫之路也」下列關於本段文字的敘述，正確的是：`,options:[`「先帝遺德」意指先帝未竟之遺願，亦即興復漢室之大業`,`(B) 「引喻失義」意謂為人主剛愎自用，無法接受群臣的諫言`,`(C) 這段文字主要勸喻後主應該廣開言路，力圖進取、恢復漢室`,`(D) 以父執輩的訓斥口吻行文，將後主的無能形象暗指於字裡行間`],answer:'C',analysis:`(A)「先帝遺德」指光大先帝所留下的美德，如開張聖聽等　(B)「引喻失義」指援引例證不恰當；例如引用公孫述、劉璋等人據益州而失敗的例子，做為蜀漢不能恢復進取的證據　(D)本段文字以父執輩的叮嚀口吻行文，勸諫後主廣開言路；並無暗指後主的無能形象於字裡行間。`},
      {id:5,type:'單選題',text:`下列關於〈桃花源記〉文意的敘述，正確的是：`,options:[`(A) 從「緣溪行，忘路之遠近」可知，漁人意不在捕魚而在賞美景，故能入桃花源`,`(B) 從文中「便捨船，從口入」可知，自現實世界進入桃花源的重要媒介是船隻`,`(C) 桃花源中的景物人情，近於老子「雞犬之聲相聞，民至老死不相往來」之說`,`(D) 桃源中人說：「不足為外人道也」是表示桃花源不值得被外人稱讚，帶有謙虛之意`],answer:'C',analysis:`(A)「忘」字寫漁人一心捕魚，無意於計算路程之遠近，同時暗示漁人所行已遠　(B)非船，而為洞口。漁人捨船前的「山有小口，彷彿若有光」，暗示桃源洞後定非尋常去處，可知洞口是進入桃花源的重要媒介；另外，可從之後漁人欲乘船返桃花源而不可得，可知重要媒介並非船隻　(D)「不足為外人道也」是桃源中人委婉表達不希望外人打擾的心意。`},
      {id:6,type:'單選題',text:`〈桃花源記〉中，以漁人「遂迷不復得路」、劉子驥規往未果作結尾。下列相關敘述，錯誤的是：`,options:[`(A) 說明桃源仙境虛無縹緲，尋訪未果與是否為「高尚士」無關`,`(B) 此處暗示理想世界破滅，並以積極的態度，期許眾人以各種方式再赴桃花源`,`(C) 漁人的「不復得路」，正是陶淵明留予讀者的想像空間，增添作品的無窮韻味`,`(D) 漁人「無意」入桃源，而「有心」卻遍尋而無法進入，正為道家「著意便迷惑」的寫照`],answer:'B',analysis:`(A)文中劉子驥作為「高尚士」，仍尋桃花源未果，暗示桃花源的虛無縹緲與「有心」規往的不可得　(B)本處僅暗示理想世界破滅（桃花源再度尋訪而不可得），並無期許眾人以各種方式再赴桃花源　(C)桃源仙境的開而復閉，漁人的得而復失，是作者留下的千古之謎，留給讀者無限的想像空間，亦增添了作品的無窮趣味　(D)作者在首段中寫漁人「無意」間進入桃源，而結尾「有心」人卻遍尋桃源而不可得，這「有」與「無」之間，正為道家「著意便迷惑」的寫照。「著意便迷惑」指加入了人的私念後，就容易變得迷茫困惑。`},
      {id:7,type:'單選題',text:[`根據下文，下列敘述正確的是：`,`　　江州刺史王弘欲識之，不能致也。潛嘗往廬山，弘令潛故人龐通之齎酒具於半道栗里要之。潛有腳疾，使一門生二兒輦籃輿。既至，欣然便共飲酌，俄頃弘至，亦無忤也。\t(《宋書．陶潛傳》)`].join(String.fromCharCode(10)),options:[`(A) 全文凸顯陶淵明性格曠放不群，行為舉止粗疏率意`,`(B) 王弘雖為刺史，結識陶淵明猶須費心布局，可見陶淵明之盛名`,`(C) 陶淵明此番廬山之行，係為個人的潛心之旅，故不想被人打擾`,`(D) 陶淵明讓門生二兒用轎抬著走，親自赴會，足見他與龐通之的情誼`],answer:'D',analysis:[`(A)可見陶淵明性格曠放任真，行為舉止率性　(B)王弘守禮，等待時機結識殊士，且陶淵明在當時並無盛名　(C)文中並未寫出陶淵明前往廬山的動機　(D)陶淵明有腳疾，不良於行，猶堅持赴會，可見其與龐通之的交誼。`,`題幹語譯：江州刺史王弘想要認識陶淵明，但沒機會。一次陶淵明前往廬山，途經栗里，王弘請陶淵明的舊友龐通之，在那裡備酒邀請陶淵明宴飲。陶淵明有腳疾，讓一個門生的二個孩子用轎子抬著走。來到栗里見到故人，欣然共酌，不久，王弘也來了，陶淵明也不在意。`].join(String.fromCharCode(10))},
      {id:8,type:'多選題',text:`關於〈鴻門宴〉人物性格分析何者正確？`,options:[`(A) 劉邦：能屈能伸，善於納言`,`(B) 張良：洞燭機先，浮躁驕狂`,`(C) 項羽：剛愎自用，粗疏自傲`,`(D) 范增：顧全大局，沉著機智`,`(E) 樊噲：豪邁忠貞，智勇雙全`],answer:'ACE',analysis:`(B)張良：顧全大局，沉著機智　(D)范增：洞燭機先，浮躁驕狂。`},
      {id:9,type:'多選題',text:`為避免行文繁冗，文言語句中常有省略句中主語、謂語或賓語的現象。下列各語句中省略部位的分析，正確的是：`,options:[`(A) （臣）苟全性命於亂世，（君）不求聞達於諸侯`,`(B) （漁人）復前行，欲窮其林。林盡水源，便得一山`,`(C) 張良曰：「秦時（項伯）與臣游，項伯殺人，臣活之」`,`(D) （桃源中人）見漁人，乃大驚，問（漁人）所從來，具答之`,`(E) 項莊拔劍起舞，項伯亦拔劍起舞，常以身翼蔽沛公，莊不得擊（沛公）`],answer:'BCDE',analysis:`(A)（臣）苟全性命於亂世，（臣）不求聞達於諸侯。`},
      {id:10,type:'魔王多選題',isBoss:true,text:`華人文化中有「避諱」的習俗，如行船最忌「住」（停滯）、「翻」（翻覆），故江浙一帶，不稱「箸」而言「快（筷）兒」，言「幡布」則改稱「抹布」。下列也運用了「避諱」概念的是：`,options:[`(A) 今天下崩亂，主上蒙塵`,`(B) 先帝知臣謹慎，故臨崩寄臣以大事也`,`(C) 賈夫人仙逝揚州城／冷子興演說榮國府`,`(D) 生孩六月，慈父見背。行年四歲，舅奪母志`,`(E) 南陽劉子驥，高尚士也，聞之，欣然規往，未果`],answer:'ABCD',analysis:`魔王題解析： (A)以「蒙塵」避諱直言帝王失位、逃亡在外。《後漢書．劉虞傳》。語譯：如今天下大亂，國君也逃亡在外　(B)以「崩」代指劉備之死，避諱直言死亡　(C)以「仙逝」避諱直言死亡。曹雪芹《紅樓夢》第二回回目　(D)以「見背」避諱直言父親之死；以「舅奪母志」避諱直言母親改嫁。李密〈陳情表〉。語譯：出生才六個月，父親就去世。年齡到了四歲時，舅父逼迫母親改變守節之志，令其改嫁　(E)本句正面稱讚劉子驥為「高尚士」，並以其仍尋桃花源未果，暗示桃花源的虛無縹緲；並無運用避諱的概念。`}

      {id:4,type:'單選題',text:`中文詞彙常會隨著時代演進而衍化出新義，如：「精采」在「俄而文皇來，精采驚人」時作「精神風采」解，後來產生出了「形容事物佳妙出色」的意思。下列未有此種詞義轉變現象的是：`,options:[`(A) 飄飄乎如遺世「獨立」，羽化而登仙／當年的小孩已經長大到能「獨立」生活的年紀`,`(B) 縱一葦之所如，凌萬頃之「茫然」／面對巨大的打擊，他「茫然」呆坐，一時說不出話`,`(C) 觀李郎儀形器宇，真「丈夫」也／富貴不能淫，貧賤不能移，威武不能屈；此之謂大「丈夫」`,`(D) 嘗見一人，余謂之「真人」，其餘，將相而已／「真人」面前不說假話，我就把這件事情的真相告訴你吧`],answer:'C',analysis:`(A)超群特立／不依靠他人而自立　(B)廣大而無邊際／猶惘然，失意的樣子　(C)皆指「有所作為的人」。後者出自《孟子．滕文公下》。語譯：富貴不能動搖他的心意，貧賤不能改變他的節操，威武不能挫折他的志氣。這樣的人，才叫做大丈夫　(D)真命天子／指真誠可靠或知情的人。`},
      {id:5,type:'單選題',text:`下列「　」中的詞語，不是用天文星象作喻的是：`,options:[`(A) 人生不相見，動如「參與商」`,`(B) 噫！「斗筲之人」，何足算也`,`(C) 月出於東山之上，徘徊於「斗牛之間」`,`(D) 眼見「斗杓又將東指」，人又要添一歲了`],answer:'B',analysis:`(A)「參」，參宿。「商」，商星，為心宿的主星。杜甫〈贈衛八處士〉。語譯：世間摯友難得相見，就好像此起彼落的參宿、商星一樣　(B)斗筲之人：比喻器量狹小，才疏學淺的人。《論語．子路》。語譯：唉！那些器量狹小，才疏學淺的人，又算得上什麽呢　(C)「斗牛」泛指星斗　(D)斗杓東指：斗柄指向東方，表示春季來臨。《老殘遊記》第二回。`}

    ROUND_THREE.push(
      {id:6,type:'單選題',text:`下列有關〈師說〉文句句意的解釋，正確的是：`,options:[`(A) 文中以「無貴、無賤」批判「巫醫、樂師、百工之人，不恥相師」；以「無長、無少」批判「位卑則足羞，官盛則近諛」`,`(B) 因「道之所存，師之所存」，故士大夫「愛其子，擇師而教之，於其身也則恥師焉」`,`(C) 文中韓愈以「非吾所謂傳其道、解其惑者也」點出時人「小學而大遺」之不當的從師態度`,`(D) 「余嘉其能行古道」，其中之「古道」是指儒家經典著作`],answer:'C',analysis:`(A)「無貴、無賤」用以破除「位卑則足羞，官盛則近諛」的說法；「無長、無少」既呼應「生乎吾前」、「生乎吾後」的主張，同時也用以破除「年相若」則不能相師的說法　(B)「愛其子，擇師而教之，於其身也則恥師焉」指陳當代士大夫對從師問學之道認知上的偏差誤謬，與「道之所存，師之所存」一句無關　(D)「古道」指古人從師問學之道。`},
      {id:7,type:'單選題',text:`下列關於〈虬髯客傳〉之敘述，正確的是：`,options:[`(A) 本文取材於歷史，以史傳所載之楊素、李靖、紅拂女、李世民增加故事之真實性，引人入勝`,`(B) 風塵三俠之性格分明又交相輝映，如李靖的遠見卓識、紅拂女的慧眼識英雄、虬髯客能讓能捨的襟懷，皆展現不凡風采`,`(C) 小說人物出場順序亦可見杜光庭經營之用心，如：以紅拂女先登場襯托李靖之沉著、膽識，並驗證「絲蘿非獨生，願託喬木」之語`,`(D) 文末以虬髯客含恨遠走異鄉收結，凸顯「真人之興也，非英雄所冀」的中心思想，告誡亂臣賊子莫生非分之想`],answer:'B',analysis:`(A)紅拂女並非史傳有載之人物　(C)小說起筆以楊素先出，李靖次出，紅拂女又次出，才識器量皆一層高過一層　(D)虬髯客能讓能捨，並未含恨抱屈，反而以雄厚家產贈與李靖夫婦，欲資助李世民成就大業，表現出過人的智慧與胸襟。`},
      {id:8,type:'單選題',text:`下列有關〈赤壁賦〉一文文句的闡釋，最為適切的是：`,options:[`(A) 「渺渺兮予懷，望美人兮天一方」：表達遊子漂泊天涯，思念故鄉之情`,`(B) 「固一世之雄也，而今安在哉」：有世事滄桑之嘆，意近「大江東去，浪淘盡，千古風流人物」`,`(C) 「況吾與子，漁樵於江渚之上，侶魚蝦而友麋鹿。……哀吾生之須臾，羨長江之無窮」：透露作者仁民愛物的襟懷，與魚蝦麋鹿為友`,`(D) 「自其不變者而觀之，則物與我皆無盡也」：藉墨家講究切合實用的角度，勸友人不必過於多愁善感`],answer:'B',analysis:`(A)「美人」在此借指思慕的賢人（或國君），與遊子漂泊天涯，思念故鄉之情無關　(C)因宇宙之無窮與吾人之渺小、生命之短暫對比而生悲　(D)意謂若能認知「現象改變，但本體如常」的真理常道，即能安然自適。`},
      {id:9,type:'單選題',text:[`閱讀下文，可推知柳宗元所欲擔任的老師類型是：`,`今世固不少章句師，僕幸非其人。吾子欲之，其有樂而望吾子者矣。言道、講古、窮文辭以為師，則固吾屬事。僕才能勇敢不如韓退之，故又不為人師。`,`（節錄自柳宗元〈答嚴厚輿秀才論為師道書〉）`].join(String.fromCharCode(10)),options:[`(A) 辨析章句的老師`,`(B) 順應學生欲望的老師`,`(C) 有才華、膽識的老師`,`(D) 講解道理、窮究文辭內涵的老師`],answer:'D',analysis:[`(D)由文中「言道、講古、窮文辭以為師，則固吾屬事」可知柳宗元欲擔任的教師類型是「講解道理、窮究文辭內涵的老師」；只是因為柳宗元自認為自己的才能與膽量比不上韓愈，而不願擔任老師。`,`題幹語譯：當今世間有不少拘泥於辨析章句的老師，我所幸並非這樣的人。你如果想學習這樣的學問，這其中仍有不少樂趣期盼著你去學習。至於以談論道理、講解古事、窮究文辭內涵等方式擔任老師，這本來就是我們所做的事。只是我的才能與膽量比不上韓退之（韓愈），所以不願擔任老師。`].join(String.fromCharCode(10))},
      {id:10,type:'單選題',isBoss:true,text:[`不直接把人或事物的名稱說出來，而借用跟該人或事物具有密切關係，能顯示其特徵的名稱來代替，這種修辭稱為「借代」；例如以「絲竹」借代為「音樂」。下列亦使用「借代」修辭的是：`,`(甲)衛公李靖以布衣來謁／(乙)形骸且健，方寸甚安／(丙)絲蘿非獨生，願託喬木／(丁)舳艫千里，旌旗蔽空／(戊)哀吾生之須臾，羨長江之無窮／(己)黃髮垂髫，並怡然自樂`].join(String.fromCharCode(10)),options:[`(A)甲乙丁己`,`(B)甲丙丁戊`,`(C)乙丙戊己`,`(D)乙丁戊己`],answer:'A',analysis:`(甲)「布衣」借指平民／(乙)「方寸」借指心。白居易〈與元微之書〉。語譯：身體還算健康，心情也很安穩／(丙)借喻女子嫁人，願依託終生／(丁)「舳艫」借指船／(戊)映襯／(己)「黃髮」借指老人，「垂髫」借指兒童。陶淵明〈桃花源記〉。`}

      {id:4,type:'單選題',text:`中文詞彙常會隨著時代演進而衍化出新義，如：「奔走」在「諸門人環聽奔走」時作「急行、跑來跑去」解，後來產生出了「驅使」、「為一定目的而忙碌」的意思。下列未有此種詞義轉變現象的是：`,options:[`(A) 其後二年，余久病「無聊」／心煩憒兮意「無聊」`,`(B) 日影反照，室始「洞然」／天下之事，自可「洞然」`,`(C) 室僅「方丈」，可容一人居／一寺之事，「方丈」總其成`,`(D) 杏桃相次「開發」／酒所以「開發」胸懷，詩所以吟詠性情`],answer:'A',analysis:`(A)皆指「鬱悶、精神空虛」。後者出自《楚辭．王逸．九思．逢尤》　(B)通透、明亮的樣子／清楚明瞭貌。顧炎武〈與楊雪臣〉　(C)一丈見方／指寺院、道觀的住持。黃鈞宰〈金壺浪墨〉　(D)指花兒開放／開豁顯露。羅燁〈醉翁談錄〉。`},
      {id:5,type:'單選題',text:`下列成語的意思，前後相近的是：`,options:[`(A) 萬籟有聲／車馬喧闐`,`(B) 揚眉瞬目／顧盼神飛`,`(C) 綠煙紅霧／愁紅慘綠`,`(D) 一朝一夕／一日三秋`],answer:'B',analysis:`(A)形容寂靜之極／指街上熱鬧的光景。喧闐，聲音大而雜亂　(B)眉飛目動，志得意滿的樣子／目光炯炯，神采飛揚之貌；二者前後意思相近　(C)柳綠桃紅，如煙似霧。形容花木繁盛穠麗／指經過風雨摧殘的殘花敗葉，多使人感覺愁苦淒涼　(D)形容短促的時間／比喻思慕殷切。`}

      {id:6,type:'單選題',text:`下列關於〈項脊軒志〉之敘述，正確的是：`,options:[`(A) 全文作於歸有光四十歲，以前半生行跡為線索，採順序方式鋪寫，興發一己之襟懷與對親人的懷念`,`(B) 文中敘述影響個人生活的女性人物及女性典範，既見親人的教誨，亦可窺知當時的價值觀`,`(C) 文中善用對話以懷人，如：以「兒寒乎？欲食乎？」寫母親關懷自己是否溫飽的回憶；以「他日汝當用之」寫祖母昔日之殷切期盼`,`(D) 仿《史記》筆法，藉論贊之語開發個人抱負，如：以諸葛亮自比，願貢獻才學、有補於世；以蜀清自比，求利甲天下、豐厚家產`],answer:'B',analysis:`(A)全文分兩次寫成，前四段作於十八歲，後兩段於十餘年後補敘；文章以項脊軒之興革為線索　(B)文中記歸氏祖母、乳母、母親、妻，可見家中女性對其影響；延續家風功名，則可見當時社會的價值觀　(C)「兒寒乎？欲食乎？」為老嫗轉述母親關懷歸有光之姊的往事；文中雖未直寫母親具體關懷歸有光之事例，但對歸有光的關愛實則包含其中　(D)作者以蜀清自比，乃因蜀清能持守先輩之業，而作者則有志於繼承祖先的志業，且蜀清昧昧於一隅而終揚名於世，作者則「區區處敗屋中」而志在用世；故非求利甲天下、豐厚家產。`},
      {id:7,type:'單選題',text:`下列關於〈項脊軒志〉中所抒發情感的敘述，正確的是：`,options:[`(A) 以「借書滿架，偃仰嘯歌，冥然兀坐，萬籟有聲」寫其居於項脊軒的生活情貌。在幽靜的環境裡，勤奮讀書、安貧樂道，抒發恬淡自足之樂`,`(B) 以「明月半牆，桂影斑駁，風移影動，珊珊可愛」寫月夜賞桂，雖桂花、桂葉已斑駁落盡，但其枯枝受風吹拂，亦有疏淡之美`,`(C) 以「余泣，嫗亦泣」寫對宗族分家之無奈與哀傷，以「長號不自禁」抒發因自幼喪母，而不能受母親疼愛、關懷的悲痛`,`(D) 以「時至軒中，從余問古事，或憑几學書」寫妻子雅好文藝、才學極高，能與自身志趣相投，夫妻二人鶼鰈情深`],answer:'A',analysis:`(B)「斑駁」為樹影錯雜之貌，非指枯枝。此段寫月光反照樹影於牆，凸顯歸有光幽靜、自適之情　(C)歸有光八歲喪母，只得透過老嫗的回憶，懷念母親；而以「語未畢，余泣，嫗亦泣」作結。「長號不自禁」是寫歸有光對祖母的懷念　(D)夫妻二人雖志趣相投，但歸有光之妻僅是「練習寫字」，可稱為好學，但不足以稱「才學極高」。`},
      {id:8,type:'單選題',text:`下列關於〈晚遊六橋待月記〉之文句闡釋，正確的是：`,options:[`(A) 以「今歲春雪甚盛，梅花為寒所勒」寫袁宏道雅愛梅花，對春雪導致梅花遲開，深感嘆惋`,`(B) 以「綠煙紅霧，彌漫二十餘里」寫西湖岸邊，遊人如織；男男女女，皆著華麗服飾，豔冶極矣`,`(C) 以「杭人遊湖，止午、未、申三時」指出杭州人遊湖未得其妙，不能真正品味西湖美景之精妙處`,`(D) 以「花態柳情，山容水意，別是一種趣味」描寫日昇之初與日暮之時，西湖山光水色飽富靈性之美`],answer:'C',analysis:`(A)袁宏道獨愛桃花。此句寫梅花花期推遲，與杏、桃齊放於西湖奇景，但仍無法吸引袁宏道　(B)此句為描寫西湖岸邊，桃紅柳綠、花木繁盛穠麗的春景　(D)非描寫「朝日始出，夕舂未下」，而是以「花柳山水」的精神層次之美，深化「月景尤不可言」。`},
      {id:9,type:'單選題',text:`下列關於〈晚遊六橋待月記〉之敘述，正確的是：`,options:[`(A) 以「待月」為題，極力描寫月夜之美，除以山水花柳作為映襯外，袁宏道更實寫月亮初升、清光拂照大地的美景，並以「別是一種趣味」評之`,`(B) 以「歌吹為風，粉汗為雨」描寫袁宏道雅愛音樂、美人，遊湖時總著意欣賞由歌聲、人潮交織的豔冶春光`,`(C) 末段以「此樂留與山僧遊客受用」，傳達作者超凡脫俗的心靈；此處的「遊客」並非白晝遊西湖之杭人，而是真正能品賞山水之美的文人雅士`,`(D) 全文以月夜之淡雅、朝日薄暮之濃媚、遊人之豔冶推擴至對桃花之深深眷戀，層層遞進，凸顯袁宏道棄梅就桃的獨特審美品味`],answer:'C',analysis:`(A)作者並未實寫月升之景，而是以虛筆「月景尤不可言」、「花態柳情，山容水意」、「別是一種趣味」等，營造「待月」之感　(B)袁宏道雅愛的是西湖之朝煙、夕嵐、月夜；「歌吹為風，粉汗為雨」是以誇飾筆法寫遊客之盛，非西湖美景所在，以「豔冶」形容之，除了形容豔麗得近乎冶蕩的春色，其中也隱含有讚嘆、嘲諷之意　(D)全文脈絡為：深戀桃花→遊人之豔冶→朝日、薄暮之濃媚→月夜之清新淡雅。`},
      {id:10,type:'單選題',isBoss:true,text:`〈勞山道士〉雖以「道士」為篇名，但實際落筆重心在王生身上。下列對王生的敘述，正確的是：`,options:[`(A) 「故家子。少慕道，聞勞山多仙人，負笈往遊」寫王生雖身處富貴之家，但有高潔之志，慕佛求道，心意虔誠`,`(B) 「過月餘，手足重繭，不堪其苦，陰有歸志」寫採樵工作繁重勞累，超乎常人負荷，王生暗地裡便生歸道之志`,`(C) 「王竊忻慕，歸念遂息」寫王生在道士展現法術之後，有感於道術玄妙無比，因而完全痛改前非，捨棄歸家之念`,`(D) 「王慚忿，罵老道士之無良而已」寫王生毫無自省之心，未遵守道士「歸宜潔持」之叮囑，一心只想誇耀於家人`],answer:'D',analysis:`(A)「故家子」一句暗示王生的性格，為下文的「不能作苦」埋下伏筆　(B)王生才採樵月餘就手足重繭，可見工作的辛苦，王生不堪其苦，陰有歸志，可知王生向道之心不堅，非力歸於道　(C)看到勞山道士與其道友飲酒作樂的奇幻情景，使王生對道士高妙的法術心生欣羨之情，於是「歸念遂息」；這個歷程揭示了王生學道心態功利，並未痛改前非。`}
    );
    const ROUND_FIVE = [
      {id:1,type:'單選題',text:`下列「　」中的字音，前後相同的是：`,options:[`(A) 不分「畛」域／暴「殄」天物`,`(B) 雨水「濡」履／性情「懦」愚`,`(C) 氣勢「磅」礴／「滂」沱大雨`,`(D) 舍「桴」而步／野有餓「殍」`],answer:'C',analysis:`(A)ㄓㄣˇ／ㄊㄧㄢˇ　(B)ㄖㄨˊ／ㄋㄨㄛˋ　(C)皆音ㄆㄤ　(D)ㄈㄨˊ／ㄆㄧㄠˇ。`},
      {id:2,type:'單選題',text:`下列「　」中的用字前後替換後，意義維持不變的是：`,options:[`(A) 「靡」不以鹿港為中樞：無`,`(B) 一水通津，出海之「涘」：俟`,`(C) 燎原莫「遏」，玉石俱焚：扼`,`(D) 宜早寢，勿「悞」樵蘇：悟`],answer:'A',analysis:`(B)涘：水邊／俟：等候　(C)遏：阻止／扼：捉、持、握　(D)悞：通「誤」／悟：明白、覺醒。`},
      {id:3,type:'單選題',text:`下列文句用字完全正確的是：`,options:[`(A) 在眾多女作家中，最為人孰知的還是宋代詞人李清照`,`(B) 張李德和是臺灣的女性創作者，其詩數可觀、題材多樣`,`(C) 探尋古代文才秀異的女子，可以上訴到蔡琰的〈胡笳十八拍〉`,`(D) 從張李德和的詩文當中，能看到當時臺灣逐漸抬頭的女性異識`],answer:'B',analysis:`(A)孰→熟　(C)訴→溯　(D)異→意。`},
      {id:4,type:'單選題',text:`下列「　」內字詞，前後詞義相同的是：`,options:[`(A) 海天蒼蒼、海水「茫茫」／「茫茫」上古，結繩而治`,`(B) 余亦無心至於隄下，臨海「徘徊」／坐臥「徘徊」，自朝至於日昃`,`(C) 此皆不墮「聰明」，而有志竟成者也／「聰明」君子者，善服人者也`,`(D) 節奏「鏗鏘」，蔡女撰胡笳之拍／今有集一卷傳世，皆「鏗鏘」蘊藉之作也`],answer:'B',analysis:`(A)浩大無邊／遙遠。荀悅〈漢紀論〉。語譯：遙遠的上古時代，透過結繩記事的方法治理天下　(B)皆指「往返迴旋、來回走動」。後者出自《聊齋誌異．嬰寧》。語譯：從早上到太陽西斜，或坐、或臥、或來回走動　(C)智力強、天資高／謂明察事理。《荀子．王霸》。語譯：能明察事理的君子，善於使人信服　(D)形容金玉或樂器等聲音洪亮清脆／形容作品音節流暢，言語有力。辛文房《唐才子傳．殷堯藩》。語譯：當今有一卷傳世，都是音節流暢，言語有力，且含蓄而不顯露的作品。`},
      {id:5,type:'單選題',text:`下列關於〈勸和論〉一文的作者及內容說明，錯誤的是：`,options:[`(A) 本文主旨在勸導臺灣百姓要和睦相處，不要以族群劃分彼此`,`(B) 作者鄭用錫，平日樂善好施，熱心公益，鄉里稱之為「鄭善人」`,`(C) 首段即開門見山，直指失和的關鍵，以「甚」字強調問題的嚴重`,`(D) 「自林逆倡亂以來，有分為閩、粵焉，有分為漳、泉焉」呼應「邪與正各為一類，此不可不分」`],answer:'D',analysis:`(D)應是呼應首段「其禍倡於匪徒」。`}
    ];
    ROUND_FIVE.push(
      {id:6,type:'單選題',text:`〈鹿港乘桴記〉：「猶幸市況凋零，為當道所不齒，不至於市區改正，破裂闤闠，驅逐人家以為通衢也」下列關於本段文句的說明，正確的是：`,options:[`(A) 敘述鹿港雖已沒落，猶不至於使原有的市區改正或驅逐民家`,`(B) 期待鹿港能華麗變身，以新的都市規畫，改頭換貌，展現新姿`,`(C) 說明鹿港當時已破敗至極，當地住民及管治者皆無心再留居此處`,`(D) 直言鹿港今日雖見破敗，來日市區改正重建後，必然廣設通暢大道`],answer:'A',analysis:`(A)鹿港在清代便已逐漸走向沒落，儘管作者曾親眼見證鹿港的「未至於斯之衰也」，卻無法否認鹿港的江河日下係發展趨勢的必然結果。作者於此段文字中，亦將鹿港的衰敗歸咎於日本殖民政府，並將改善街道空間與環境衛生的「市區改正」批評為破壞性的不當施政。`},
      {id:7,type:'單選題',text:`下列最能說明張李德和從事「畫菊」之志向的是：`,options:[`(A) 此皆不墮聰明，而有志竟成者也`,`(B) 竊慕管夫人之墨竹，敢藉陶彭澤之黃花`,`(C) 學琴學詩，均從所好；工書工畫，各有專長`,`(D) 庶幾秋姿不老，四座流芬；得比勁節長垂，千人共仰`],answer:'D',analysis:`(A)(B)(C)僅言作者藝文之志，未針對「畫菊」之志向而來　(D)言作者之畫菊，形、神兼備，並用以寄託具高遠之志向。`},
      {id:8,type:'單選題',text:`下列關於〈勸和論〉、〈鹿港乘桴記〉、〈畫菊自序〉文句句意的闡釋，正確的是：`,options:[`(A) 「乃同此血氣，同此官骸，同為國家之良民，同為鄉閭之善人，無分土，無分民」：從血緣及地緣兩個角度進行論證，認為沒有理由刻意劃分族群，強調「和」的重要`,`(B) 「海水浮天如笠，一白萬里如銀，滉漾碧綠如琉璃」：描述渡海時的洋流景象，平靜無波，一碧萬頃`,`(C) 「向時估帆所出入者，時已淤為沙灘，為居民鋤作菜圃矣」：借今昔對比，描寫鹿港純樸的農家生活`,`(D) 「竊慕管夫人之墨竹，紙上生風；敢藉陶彭澤之黃花，圖中寫影」：分論管道昇、陶淵明之藝術表現，品評二人高下`],answer:'A',analysis:`(B)本句應是描寫海水上浮著的天空形狀如同斗笠，一片白色的寬闊海洋映照天光如同白銀，海水浮動盪漾，碧綠得如同琉璃；寫景的視角由上而下，景物有動有靜，色彩紛呈　(C)本句透過「昔今對比」的角度，從地理層面切入，記錄鹿港昔今改變的景況　(D)「慕管夫人之墨竹，紙上生風」強調的是藝術創作的「形」（技藝風格），「藉陶彭澤之黃花，圖中寫影」追求的是「神」（內在的人格風範），形神兼備，既見作者藝術創作之誠心，亦展現其追求勁節的高尚品格；本句無分論、品評二人高下之意。`},
      {id:9,type:'單選題',text:[`閱讀下文，依據文意，□□中最適合填入的詞語依序是：`,`當其耕時，不言不殺，男婦雜作山野，□□如也。道路以目，少者背立，長者過，不問答，即華人侮之，不怒。禾熟復初，謂不如是，則天不祐、神不福，將凶歉，不獲有年也。女子□□，女常勞，男常逸。盜賊之禁嚴，有則戮於社，故夜門□□；禾積場，無敢竊。　（陳第〈東番記〉）`].join(String.fromCharCode(10)),options:[`(A) 恂恂／荏弱／不閉`,`(B) 默默／健作／不閉`,`(C) 恂恂／健作／深鎖`,`(D) 默默／荏弱／深鎖`],answer:'B',analysis:[`「恂恂」有溫和恭敬、誨人不倦、緊張恐懼之意，從前述「不言」可知選「默默」較適當。「荏弱」指軟弱，從「女常勞，男常逸」可知女子非「荏弱」，而為「健作」。從「盜賊之禁嚴」、「無敢竊」可以知道民風樸實、不敢盜竊，故夜門不需「深鎖」，應為「不閉」。`,`題幹語譯：東番人在耕作的時候，不講話也不爭鬥，男女混雜的在山野耕種，都默默無語。在路上相遇，只用眼睛看著對方，年輕人會轉身背對的站著，讓長者經過，不會打招呼，這個時候，即使有漢人欺負他們，東番人也不會生氣。等到稻子成熟了，東番人才又恢復原來的生活方式，他們認為，如果不這麼做，則老天不會保佑，神明不會降福，農作將會歉收，不能獲得豐年。東番人的婦女都勤於耕種，常常辛苦忙碌，男人反而過得悠閒安逸。東番人嚴禁盜賊，如有觸犯的人，就會在部落中把他處死，所以夜晚不必關閉門戶；稻穀堆放在廣場，也沒有人敢偷竊。`].join(String.fromCharCode(10))},
      {id:10,type:'單選題',isBoss:true,text:[`閱讀以下二文，下列敘述正確的是：`,`甲、由秀才封王，主持半壁舊江山，為天下讀書人頓生顏色；`,`　　驅外夷出境，開闢千秋新事業，願中國有志者再鼓雄風。`,`乙、開千古得未曾有之奇，洪荒留此山川，作遺民世界；`,`　　極一生無可如何之遇，缺憾還諸天地，成創格完人。`].join(String.fromCharCode(10)),options:[`(A) 甲篇之主人公，號令天下自稱為王，百姓皆額手稱慶`,`(B) 乙篇指出「完人」並非事實，因其未盡努力猶有缺憾`,`(C) 就其形制而言，二篇句式長短不一，押韻可變，應為古樂府`,`(D) 二篇所書寫的對象應是人稱「國姓爺」、「延平王」的鄭成功`],answer:'D',analysis:[`(A)鄭成功並未自稱為王　(B)「完人」係推崇鄭成功之功，雖已盡努力但猶有未逮，故只能將缺憾還諸天地　(C)二篇皆為對聯（聯語），非為古樂府；樂府詩一般句法參差。`,`題幹說明、出處、語譯：`,`甲：由「秀才封王」（鄭成功於明崇禎11年（1638）考中秀才）、「驅外夷出境」（1622年2月），可看出鄭成功的經歷和歷史功績。聯中號召「讀書人」、「有志者」，以鄭成功為榜樣，打擊侵略者，保衛國家。唐景崧〈鄭成功祠聯〉。語譯：秀才出身的鄭成功，堅決參加抗清鬥爭，封王主持反清活動，大大地振奮了人心，也為讀書人樹立了榜樣；他打敗、驅逐了荷蘭人出境，荷蘭人投降，為全國統一立下了豐功偉績，讓有志大業者，振奮了精神。`,`乙：由「遺民世界」、「創格完人」可知是鄭成功。沈葆楨〈鄭成功（延平郡王）祠聯〉。語譯：鄭成功是盤古開天以來未曾有過的奇才，開墾原始的臺灣成為美麗的河川當作明朝遺民的世界；窮極一生就算有無可奈何的遭遇和遺憾，但是這些遺憾都回歸給天地了，還是開創格局，成為道德完美的人。`].join(String.fromCharCode(10))}

    function renderRoundQuestion(){const p=roundProgress(),list=roundQuestions();if(p.index>=list.length){stageClearRound();return;}const q=activeQuestion(),multi=q.type.includes('多選');$('questionNumber').textContent=`第 ${q.id} 題`;$('questionType').textContent=q.type;$('questionText').textContent=q.text;$('bossBadge').classList.toggle('hidden',!q.isBoss);$('bossVisual').classList.toggle('show',!!q.isBoss);optionsEl.innerHTML='';q.options.forEach((option,index)=>{const letter=roundOptionLetter(option,index),label=document.createElement('label');label.className='option';label.innerHTML=`<input type="${multi?'checkbox':'radio'}" name="round-answer" value="${letter}"><span></span>`;label.querySelector('span').textContent=option;label.addEventListener('change',()=>{if(!p.solved[q.id])label.classList.toggle('selected',label.querySelector('input').checked);if(!multi)[...optionsEl.querySelectorAll('.option')].forEach(x=>x.classList.toggle('selected',x.querySelector('input').checked));});optionsEl.append(label);});$('submitBtn').disabled=!!p.solved[q.id];$('nextWrap').classList.toggle('show',!!p.solved[q.id]);feedback.className='feedback';feedback.innerHTML='';updateRoundHud();}
    function showRoundFeedback(correct){const q=activeQuestion(),boss=ROUND_META[activeRound].boss;feedback.className=`feedback show ${correct?'correct':'wrong'}`;feedback.innerHTML=`<h3>${correct?`✅ 答對！對${boss}造成 10 點傷害。`:'⚠️ 尚未擊中弱點'}</h3><p><strong>正確答案：</strong>${q.answer.toUpperCase()}</p><details open><summary>詳細解析</summary><p>${q.analysis}</p></details><button class="secondary" id="teacherBtn">✨ 夫子開示</button>`;$('teacherBtn').onclick=()=>teacherModal(q);}
    function submitRound(){const q=activeQuestion(),p=roundProgress(),answer=selected();if(!answer){feedback.className='feedback show wrong';feedback.innerHTML='<h3>請先選擇答案。</h3>';return;}if(answer===q.answer.toUpperCase()){p.solved[q.id]=true;state.exp+=10;save();playSfx(true);$('battlePanel').classList.add('shake-good');setTimeout(()=>$('battlePanel').classList.remove('shake-good'),500);vibrate(45);showRoundFeedback(true);$('submitBtn').disabled=true;$('nextWrap').classList.add('show');updateRoundHud();}else{state.exp=Math.max(0,state.exp-2);p.wrong.push({id:q.id,answer});save();playSfx(false);$('app').classList.add('shake-wrong');setTimeout(()=>$('app').classList.remove('shake-wrong'),500);vibrate([70,45,90]);showRoundFeedback(false);updateRoundHud();}}
    function nextRoundQuestion(){roundProgress().index++;save();renderRoundQuestion();window.scrollTo({top:0,behavior:'smooth'});}
    function openRound(round){if((round===2&&!state.round1Complete)||(round===3&&!state.round2Complete)||(round===4&&!state.round3Complete)||(round===5&&!state.round4Complete))return;activeRound=round;setRoundChrome();mapView.classList.remove('active');stageView.classList.add('active');renderRoundQuestion();}
    function stageClearRound(){const p=roundProgress(),misses=[...new Set(p.wrong.map(x=>x.id))];let nextMessage;if(activeRound===1){state.round1Complete=true;nextMessage='第二回「鴻門戰場」已解鎖！';}else if(activeRound===2){state.round2Complete=true;nextMessage='第三回「師道學院」已解鎖！';}else if(activeRound===3){state.round3Complete=true;nextMessage='第四回「項脊軒書院」已解鎖！';}else if(activeRound===4){state.round4Complete=true;nextMessage='第五回「和諧部落」已解鎖！';}else{state.round5Complete=true;nextMessage='五大秘境全數征服，你已成為國文宗師 Lv.100！';}save();updateRoundMap();const weakness=misses.length?'需回顧：'+misses.map(id=>`第 ${id} 題`).join('、'):'全程無失誤，對古文基礎與修辭辨析掌握良好。';modal(`<h2>Stage Clear！</h2><span class="clear-stamp">${activeRound===5?'國文宗師':'已稱霸'}</span><p>${ROUND_META[activeRound].boss}已被擊敗。第 ${activeRound} 回全 10 題完成，${nextMessage}</p><h3>錯題記錄</h3>${misses.length?`<ul class="error-list">${misses.map(id=>`<li>第 ${id} 題：可由地圖重新挑戰複習。</li>`).join('')}</ul>`:'<p>沒有錯題紀錄。</p>'}<h3>弱點分析</h3><p>${weakness}</p><button class="primary" id="clearMap">前往地圖</button>`);$('clearMap').onclick=()=>{closeModal();openMap();updateRoundMap();};}
    const ROUND_STUDY_GUIDE={
      1:{focus:'〈燭之武退秦師〉、〈禮運大同篇〉、〈諫逐客書〉',method:'回到原文圈出人物立場與論證轉折；再用「字詞義—句意—主旨」三層筆記，辨析文意與修辭。'},
      2:{focus:'〈鴻門宴〉、〈出師表〉、〈桃花源記〉',method:'以人物關係圖整理情節與對話目的，再對照表格比較人物性格、表文論證及桃花源理想境界。'},
      3:{focus:'〈師說〉、〈虬髯客傳〉、〈赤壁賦〉',method:'先整理虛詞、句式與段落論點；人物傳記題要抓行動與評語，賦文則分辨景、情、理如何層層推進。'},
      4:{focus:'〈項脊軒志〉、〈晚遊六橋待月記〉、〈勞山道士〉',method:'將景物、事件與情感對照標記；特別練習敘事視角、今昔對比，以及文言語句的語譯與情節因果。'},
      5:{focus:'〈勸和論〉、〈鹿港乘桴記〉、〈畫菊自序〉',method:'分別建立議論文的論證、遊記的移步換景、序文的託物言志三張筆記，並重做錯題的每一個選項，寫下錯誤理由。'}
    };
    function escapeHtml(value){return String(value).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}
    function questionBank(round){return ({1:ROUND_ONE,2:ROUND_TWO,3:ROUND_THREE,4:ROUND_FOUR,5:ROUND_FIVE})[round];}
    function distinctMistakes(round){const p=state.rounds[round]||{wrong:[]};return [...new Map(p.wrong.map(item=>[item.id,item])).values()];}
    function finalReportHtml(){
      const allMistakes=[];
      for(let round=1;round<=5;round++){
        distinctMistakes(round).forEach(record=>allMistakes.push({round,record,q:questionBank(round).find(q=>q.id===record.id)}));
      }
      const chips=Array.from({length:5},(_,index)=>{const round=index+1;return `<div class="round-error-chip">第 ${round} 回<strong>${distinctMistakes(round).length} 題</strong></div>`;}).join('');
      const list=allMistakes.length?allMistakes.map(({round,record,q})=>`<details class="miss-card"><summary><span>第 ${round} 回・${ROUND_META[round].name}</span><strong>第 ${q.id} 題</strong><span>錯答 ${escapeHtml(record.answer)} → 正解 ${escapeHtml(q.answer)}</span></summary><div class="miss-content"><h4>完整題幹</h4><p>${escapeHtml(q.text)}</p><h4>選項</h4><ol class="miss-options">${q.options.map(option=>`<li>${escapeHtml(option)}</li>`).join('')}</ol><h4>詳細解析</h4><p>${escapeHtml(q.analysis)}</p></div></details>`).join(''):'<p>恭喜！本次五回作答沒有留下錯題，建議改以限時重做與逐題說明選項理由，確認是真正精熟。</p>';
      const guides=Array.from({length:5},(_,index)=>{const round=index+1,count=distinctMistakes(round).length;if(!count)return '';const guide=ROUND_STUDY_GUIDE[round];return `<article class="study-guide"><h4>第 ${round} 回・${ROUND_META[round].name}｜錯 ${count} 題</h4><p><strong>優先篇章：</strong>${guide.focus}</p><p><strong>建議做法：</strong>${guide.method}</p></article>`;}).join('')||'<p>各回合皆無錯題；建議以計時方式重新作答，並口頭說明每個錯誤選項的排除理由。</p>';
      return `<section class="final-report"><h3>五回錯題總表</h3><p>本次共記錄 <strong>${allMistakes.length}</strong> 題曾答錯的題目。點開各題可查看完整題幹、選項與詳解。</p><div class="round-error-grid">${chips}</div>${list}<h3>加強學習方向</h3>${guides}</section>`;
    }
    function stageClearRound(){
      const p=roundProgress(),misses=[...new Set(p.wrong.map(x=>x.id))];
      let nextMessage;
      if(activeRound===1){state.round1Complete=true;nextMessage='第二回「鴻門戰場」已解鎖！';}
      else if(activeRound===2){state.round2Complete=true;nextMessage='第三回「師道學院」已解鎖！';}
      else if(activeRound===3){state.round3Complete=true;nextMessage='第四回「項脊軒書院」已解鎖！';}
      else if(activeRound===4){state.round4Complete=true;nextMessage='第五回「和諧部落」已解鎖！';}
      else{state.round5Complete=true;nextMessage='五大秘境全數征服，你已成為國文宗師 Lv.100！';}
      save();updateRoundMap();
      const weakness=misses.length?'需回顧：'+misses.map(id=>`第 ${id} 題`).join('、'):'全程無失誤，對古文基礎與修辭辨析掌握良好。';
      const finalReport=activeRound===5?finalReportHtml():'';
      modal(`<h2>Stage Clear！</h2><span class="clear-stamp">${activeRound===5?'國文宗師':'已稱霸'}</span><p>${ROUND_META[activeRound].boss}已被擊敗。第 ${activeRound} 回全 10 題完成，${nextMessage}</p><h3>錯題記錄</h3>${misses.length?`<ul class="error-list">${misses.map(id=>`<li>第 ${id} 題：可由地圖重新挑戰複習。</li>`).join('')}</ul>`:'<p>沒有錯題紀錄。</p>'}<h3>弱點分析</h3><p>${weakness}</p>${finalReport}<button class="primary" id="clearMap">前往地圖</button>`);
      $('clearMap').onclick=()=>{closeModal();openMap();updateRoundMap();};
    }
    initRoundProgress();
    $('openStage').onclick=()=>openRound(1);
    $('secondStage').onclick=()=>openRound(2);
    $('thirdStage').onclick=()=>openRound(3);
    $('fourthStage').onclick=()=>openRound(4);
    $('fifthStage').onclick=()=>openRound(5);
    $('profileBtn').onclick=()=>{modal(`<h2>冒險者檔案</h2><p>菜鳥書生 Lv.${level()}<br>目前 EXP：${state.exp}<br>已征服：${totalSolvedCount()} / ${ROUND_ONE.length+ROUND_TWO.length+ROUND_THREE.length+ROUND_FOUR.length+ROUND_FIVE.length} 題</p><button class="secondary" id="resetBtn">重設所有測試進度</button>`);$('resetBtn').onclick=()=>{if(confirm('確定清除所有已完成關卡與答題紀錄？')){localStorage.removeItem(STORAGE);location.reload();}};};
    $('submitBtn').onclick=submitRound;
    $('explainBtn').onclick=()=>showRoundFeedback(false);
    $('nextBtn').onclick=nextRoundQuestion;
    $('backMap').onclick=()=>{stageView.classList.remove('active');mapView.classList.add('active');updateRoundMap();};
    updateRoundMap();
  </script>
</body>
</html>
